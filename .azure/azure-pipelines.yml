# DO NOT EDIT azure-pipelines.yml.  Edit azure-pipelines.yml.m4 and defs.m4 instead.

# Workaround for https://status.dev.azure.com/_event/179641421
trigger:
  branches:
    include:
      - '*'
pr:
  branches:
    include:
      - '*'

variables:
  - name: system.debug
    value: true

jobs:

  - job: guava_jdk25
    pool:
      vmImage: 'ubuntu-latest'
    container: mdernst/cf-ubuntu-jdk25:latest
    timeoutInMinutes: 70
    steps:
      - checkout: self
        fetchDepth: 25
      - bash: ./checker/bin-devel/test-guava.sh
        displayName: test-guava.sh
        env:
          ORG_GRADLE_PROJECT_jdkTestVersion: 25
